<script>
  let editor;
  let isTop = true;
  let currentMatchIndex = -1;
  let currentMatches = [];
  let searchTimeout;
  let codeHistory = []; 
  let redoStack = []; 
  let currentModel = 'smart'; 
  let searchHistory = JSON.parse(localStorage.getItem('edgar_search_history') || '[]');
  let functionSearchActive = false;
  let navStates = {
    top: true,
    html: true,
    style: true,
    script: true
  };

  // 1. MONACO INITIALISIERUNG
  require.config({
    paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }
  });

  require(['vs/editor/editor.main'], function() {
    // 1. Editor Instanz erstellen
    editor = monaco.editor.create(document.getElementById('editorContainer'), {
      value: `<!DOCTYPE html>...`, // Dein HTML-Inhalt bleibt gleich
      language: 'html',
      theme: 'vs-dark',
      fontSize: 13,
      minimap: { enabled: false },
      padding: { top: 16 },
      automaticLayout: true,
      multiCursorModifier: 'ctrlCmd',
      // DIESE ZEILE IST NEU: Deaktiviert das Monaco-interne Menü
      contextmenu: false 
    });

    // --- KONTEXTMENÜ LOGIK ---
    const contextMenu = document.getElementById('custom-context-menu');

    editor.onContextMenu(function (e) {
    e.event.preventDefault();
    e.event.stopPropagation();

    const menu = document.getElementById('custom-context-menu');
    if (!menu) return;

    // 1. Menü kurz sichtbar machen (aber unsichtbar), um die Breite/Höhe zu messen
    menu.style.visibility = 'hidden';
    menu.style.display = 'block';
    
    const menuWidth = menu.offsetWidth;
    const menuHeight = menu.offsetHeight;
    const pageWidth = window.innerWidth;
    const pageHeight = window.innerHeight;

    // 2. Mausposition holen
    let posX = e.event.posx;
    let posY = e.event.posy;

    // 3. Horizontaler Check: Wenn zu weit rechts, nach links verschieben
    if (posX + menuWidth > pageWidth) {
        posX = pageWidth - menuWidth - 10; // 10px Puffer zum Rand
    }

    // 4. Vertikaler Check: Wenn zu weit unten, nach oben verschieben
    if (posY + menuHeight > pageHeight) {
        posY = pageHeight - menuHeight - 10;
    }

    // 5. Position setzen und sichtbar machen
    menu.style.left = posX + 'px';
    menu.style.top = posY + 'px';
    menu.style.visibility = 'visible';
    menu.classList.remove('hidden');

    return false;
});

    // --- KOMBINIERTE MOUSE-DOWN LOGIK (Bleibt wie sie war) ---
    editor.onMouseDown(function (e) {
      hideContextMenu();

      const sidebar = document.getElementById('sidebar');
      if (sidebar && sidebar.classList.contains('open')) {
        if (typeof toggleSidebar === "function") toggleSidebar();
      }

      if (e.event.ctrlKey || e.event.metaKey) {
        const position = e.target.position;
        const model = editor.getModel();

        if (position && model && typeof getSmartRange === "function") {
          e.event.preventDefault();
          e.event.stopPropagation();
          
          const rangeData = getSmartRange(position); 
          const newSelection = new monaco.Selection(
            rangeData.startLineNumber, 1, 
            rangeData.endLineNumber, model.getLineMaxColumn(rangeData.endLineNumber)
          );

          let currentSelections = editor.getSelections() || [];
          const idx = currentSelections.findIndex(sel => 
            sel.startLineNumber === newSelection.startLineNumber && 
            sel.endLineNumber === newSelection.endLineNumber
          );

          if (idx > -1) {
            currentSelections.splice(idx, 1); 
          } else {
            currentSelections.push(newSelection);
          }

          setTimeout(() => {
            editor.setSelections(currentSelections);
            editor.focus();
          }, 10);
        }
      }
    });
  });

async function copyToClipboard() {
    if (!editor) return;
    const selection = editor.getSelection();
    const selectedText = editor.getModel().getValueInRange(selection);
    const textToCopy = selectedText || editor.getValue();
    
    try {
      await navigator.clipboard.writeText(textToCopy);
      showToast(selectedText ? "Auswahl kopiert! ✂️" : "Alles kopiert! 📋", "green");
    } catch (err) {
      showToast("Fehler beim Kopieren", "red");
    }
    hideContextMenu();
  }

  // Hilfsfunktion (hier innerhalb, damit 'editor' sicher bekannt ist)
  function getSmartRange(pos) {
    const model = editor.getModel();
    let start = pos.lineNumber;
    let end = pos.lineNumber;
    // Sucht Grenzen basierend auf Leerzeilen
    while (start > 1 && model.getLineContent(start - 1).trim() !== "") start--;
    while (end < model.getLineCount() && model.getLineContent(end + 1).trim() !== "") end++;
    return { startLineNumber: start, endLineNumber: end };
  }


  // 2. SIDEBAR LOGIK

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
    let startTime = null;

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      if (editor) editor.layout();
      if (timestamp - startTime < 250) requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  }

  // 3. DATEI-OPERATIONEN & RUN

  function createNewFile() {
    if (confirm("Neue Datei erstellen? Ungespeicherte Änderungen gehen verloren.")) {
      editor.setValue("<!DOCTYPE html>\n<html>\n<head>\n <title>Neue Datei</title>\n</head>\n<body>\n\n</body>\n</html>");
    }

  }

  async function openLocalFile() {
    try {
      const [fileHandle] = await window.showOpenFilePicker({
        types: [{
          description: 'Web Files', accept: {
            'text/html': ['.html'], 'text/css': ['.css'], 'text/javascript': ['.js']
          }

        }]
      });
      const file = await fileHandle.getFile();
      editor.setValue(await file.text());
    } catch (err) {
      console.log("Abgebrochen");
    }

  }

  async function saveFileAs() {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'index.html',
        types: [{
          description: 'HTML Files', accept: {
            'text/html': ['.html']
          }

        }],
      });
      const writable = await handle.createWritable();
      await writable.write(editor.getValue());
      await writable.close();
      showToast("Gespeichert!", "blue");
    } catch (err) {
      console.error(err);
    }

  }

function runCode() {
    if (!editor) return;
    const overlay = document.getElementById('previewOverlay');
    const iframe = document.getElementById('previewFrame');
    
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
    
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    const userCode = editor.getValue();

    doc.open();
    // Wir fügen das Tailwind-Skript automatisch hinzu, falls die KI es vergisst
    if (userCode.includes('tailwindcss') || userCode.includes('class=')) {
doc.write('<script src="https://cdn.tailwindcss.com"><\/script>');    }
    doc.write(userCode);
    doc.close();
    
    showToast("Vorschau aktualisiert!", "blue");
}

  function closePreview() {
    const overlay = document.getElementById('previewOverlay');
    overlay.classList.replace('flex', 'hidden');
    document.getElementById('previewFrame').src = "about:blank";
  }

  // 4. NAVIGATION

  function jumpToSection(type) {
    if (!editor) return;
    const model = editor.getModel();
    const content = model.getValue();
    let startLine = 1;
    let endLine = model.getLineCount();

    // Positionen finden
    if (type === 'html') {
      const matchStart = content.match(/<body/i);
      const matchEnd = content.match(/<\/body>/i);
      startLine = matchStart ? model.getPositionAt(matchStart.index).lineNumber : 1;
      endLine = matchEnd ? model.getPositionAt(matchEnd.index).lineNumber : startLine;
    } else if (type === 'style') {
      const matchStart = content.match(/<style/i);
      const matchEnd = content.match(/<\/style>/i);
      startLine = matchStart ? model.getPositionAt(matchStart.index).lineNumber : 1;
      endLine = matchEnd ? model.getPositionAt(matchEnd.index).lineNumber : startLine;
    } else if (type === 'script') {
      const matchStart = content.match(/<script/i);
      const matchEnd = content.match(/<\/script>/i);
      startLine = matchStart ? model.getPositionAt(matchStart.index).lineNumber : 1;
      endLine = matchEnd ? model.getPositionAt(matchEnd.index).lineNumber : startLine;
    }

    // Toggle-Logik
    const targetLine = navStates[type] ? startLine : endLine;
    navStates[type] = !navStates[type];

    // Status für nächsten Klick umkehren
    editor.revealLineInCenter(targetLine);
    editor.setPosition({
      lineNumber: targetLine, column: 1
    });
    editor.focus();
    showToast(`Sprung zu ${
      type.toUpperCase()
    } ${
      !navStates[type] ? 'START' : 'ENDE'
    }`, "blue");
  }

  function selectSection(type) {
    if (!editor) return;
    const model = editor.getModel();
    const content = model.getValue();
    let startPos, endPos;
    if (type === 'top') {
      startPos = {
        lineNumber: 1, column: 1
      };
      endPos = {
        lineNumber: model.getLineCount(), column: model.getLineMaxColumn(model.getLineCount())
      };
    } else {
      const startRegex = new RegExp(`<${
        type
      }`, 'i');
      const endRegex = new RegExp(`</${
        type
      }>`, 'i');
      const matchStart = content.match(startRegex);
      const matchEnd = content.match(endRegex);
      if (matchStart && matchEnd) {
        const startCoords = model.getPositionAt(matchStart.index);
        const endCoords = model.getPositionAt(matchEnd.index + matchEnd[0].length);
        startPos = {
          lineNumber: startCoords.lineNumber, column: 1
        };
        endPos = {
          lineNumber: endCoords.lineNumber, column: model.getLineMaxColumn(endCoords.lineNumber)
        };
      }

    }

    if (startPos && endPos) {
      editor.setSelection({
        startLineNumber: startPos.lineNumber, startColumn: startPos.column,
        endLineNumber: endPos.lineNumber, endColumn: endPos.column
      });
      showToast(`${
        type.toUpperCase()
      } markiert`, "blue");
    }

  }

  function jumpToLine() {
    const input = document.getElementById('lineInput');
    const line = parseInt(input.value);
    if (!editor || isNaN(line)) return;
    const maxLines = editor.getModel().getLineCount();
    if (line > 0 && line <= maxLines) {
      editor.revealLineInCenter(line);
      editor.setPosition({
        lineNumber: line, column: 1
      });
      editor.focus();
      input.value = "";
    } else {
      showToast(`Zeile ${
        line
      } existiert nicht`, "red");
    }

  }

  // 5. SMART SELECT & ERWEITERTE SUCHE

  function triggerSmartSelect() {
    if (!editor) return;
    const position = editor.getPosition();
    const model = editor.getModel();
    const lineCount = model.getLineCount();
    let startLine = position.lineNumber;
    let endLine = position.lineNumber;
    for (let i = position.lineNumber;
    i >= 1;
    i--) {
      if (model.getLineContent(i).trim() === "" && i !== position.lineNumber) {
        startLine = i + 1;
        break;
      }

      if (i === 1) startLine = 1;
    }

    for (let i = position.lineNumber;
    i <= lineCount;
    i++) {
      if (model.getLineContent(i).trim() === "" && i !== position.lineNumber) {
        endLine = i - 1;
        break;
      }

      if (i === lineCount) endLine = lineCount;
    }

    editor.setSelection({
      startLineNumber: startLine, startColumn: 1,
      endLineNumber: endLine, endColumn: model.getLineMaxColumn(endLine)
    });
    showToast(`Block markiert`, "blue");
  }

  function updateSearchDisplay() {
    const badge = document.getElementById('searchCount');
    if (currentMatches.length > 0) {
      badge.innerText = `${
        currentMatchIndex + 1
      }/${
        currentMatches.length
      }`;
      badge.style.color = "#60a5fa";
      const match = currentMatches[currentMatchIndex];
      editor.revealRangeInCenter(match.range);
      editor.setSelection(match.range);
    }

  }

  function navigateSearch(direction) {
    if (currentMatches.length === 0) return;
    if (direction === 'next') {
      currentMatchIndex = (currentMatchIndex + 1) % currentMatches.length;
    } else {
      currentMatchIndex = (currentMatchIndex - 1 + currentMatches.length) % currentMatches.length;
    }

    updateSearchDisplay();
  }

  function clearSearch() {
    const input = document.getElementById('searchInput');
    input.value = "";
    handleSearchInput({
      target: input
    });
    editor.focus();
  }

  // Event-Listener beim Laden binden
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchInput').addEventListener('input', handleSearchInput);
    document.getElementById('lineInput').addEventListener('keydown', (e) => {
      if (e.key === "Enter") jumpToLine();
    });
    renderHistory();
  });

// Schließt das Menü, wenn man irgendwo auf die restliche Webseite klickt
document.addEventListener('click', (e) => {
    // Prüfen, ob der Klick außerhalb des Menüs war
    const menu = document.getElementById('custom-context-menu');
    if (menu && !menu.contains(e.target)) {
        hideContextMenu();
    }
});

function hideContextMenu() {
    const menu = document.getElementById('custom-context-menu');
    if (menu) {
        menu.style.display = 'none';
        menu.classList.add('hidden');
    }
}

  function handleSearchInput(e) {
    const term = e.target.value.trim();
    const badge = document.getElementById('searchCount');
    if (!editor || !term) {
      badge.innerText = "0/0";
      badge.style.color = "";
      currentMatches = [];
      currentMatchIndex = -1;
      return;
    }

    const model = editor.getModel();

    // --- FUNKTIONS-FILTER LOGIK ---
    if (functionSearchActive) {

      // Findet 'function' gefolgt von deinem Suchbegriff (case-insensitive)
      const regexTerm = `function\\s+\\w*${
        term
      }\\w*`;
      currentMatches = model.findMatches(regexTerm, true, true, false, null, true);
    } else {

      // Normale Suche wie bisher
      currentMatches = model.findMatches(term, false, false, false, null, true);
    }

    if (currentMatches.length > 0) {
      currentMatchIndex = 0;
      updateSearchDisplay();

      // Auto-History Logik (nur im normalen Modus, um die Liste sauber zu halten)
      if (!functionSearchActive) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          if (term.length > 2) {
            addToHistory(term);
          }

        }, 2000);
      }

    } else {
      currentMatchIndex = -1;
      badge.innerText = "0/0";
      badge.style.color = "#ef4444";
    }

  }

  function addToHistory(term) {

    // Prüfen, ob der Begriff schon existiert
    if (!searchHistory.includes(term)) {
      searchHistory.unshift(term);

      // Vorne hinzufügen
      if (searchHistory.length > 5) searchHistory.pop();

      // Max 5 Einträge
      // LocalStorage aktualisieren
      localStorage.setItem('edgar_search_history', JSON.stringify(searchHistory));
      renderHistory();
      showToast(`"${
        term
      }" zur Historie hinzugefügt`, "blue");
    }

  }

// Hilfsfunktion um interne Monaco-Befehle direkt aufzurufen
function executeMonacoAction(actionId) {

}

// Einfügen (Clipboard API)
async function pasteFromClipboard() {

            forceMoveMarkers: true

    }
}

// Console.log() intelligent einfügen
function insertConsoleLog() {

  // 6. ERWEITERUNGEN (TOASTS & HISTORY)

  function showToast(message, type = "blue") {
    const toast = document.createElement('div');
    const colorClass = type === "red" ? "bg-red-600" : "bg-blue-600";
    toast.className = `fixed top-4 right-4 ${
      colorClass
    } text-white px-4 py-2 rounded shadow-lg z-[200] text-xs font-bold animate-pulse`;
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  function renderHistory() {
    const container = document.getElementById('searchHistory');
    if (!container) return;
    container.innerHTML = searchHistory.map(term => `
    <span onclick="applyHistoryTerm('${
      term
    }')" class="search-tag hover:bg-blue-500 hover:text-white transition-colors">
    ${
      term
    }

  </span>
  `).join('');
}

function applyHistoryTerm(term) {
  const input = document.getElementById('searchInput');

  // Wenn der Begriff schon drin steht, springe zum nächsten Treffer
  if (input.value === term && currentMatches.length > 0) {
    navigateSearch('next');
  } else {

    // Ansonsten: Neue Suche starten
    input.value = term;
    handleSearchInput({
      target: input
    });
    if (currentMatches.length > 0) {
      currentMatchIndex = 0;
      updateSearchDisplay();
    }

  }

  input.focus();
}

function toggleFunctionSearch() {

  functionSearchActive = !functionSearchActive;
  const btn = event.currentTarget;

  // Holt den geklickten Button
  if (functionSearchActive) {
    btn.classList.add('bg-blue-600', 'text-white');
    btn.classList.remove('bg-gray-800', 'text-gray-400');
    showToast("Funktions-Suche AKTIV", "blue");
  } else {
    btn.classList.remove('bg-blue-600', 'text-white');
    btn.classList.add('bg-gray-800', 'text-gray-400');
    showToast("Normaler Such-Modus", "blue");
  }

  // Suche sofort mit neuem Modus triggern
  const input = document.getElementById('searchInput');
  handleSearchInput({
    target: input
  });
}

function setModel(model) {
    currentModel = model;
    
    // 1. Alle Modell-Buttons finden
    const buttons = document.querySelectorAll('.model-btn');
    
    // 2. Bei allen die "Aktiv"-Klasse entfernen
    buttons.forEach(btn => btn.classList.remove('active-model'));
    
    // 3. Nur dem geklickten Button die "Aktiv"-Klasse geben
    const activeBtn = document.getElementById('btn-' + model);
    if (activeBtn) {
        activeBtn.classList.add('active-model');
    }
    
    // Kleines Feedback für dich
    showToast("Modus: " + model.toUpperCase(), "blue");
}

async function insertPrompt(text) {
  const textarea = document.querySelector('textarea');
  if (!textarea || !editor) return;

  // 1. Markierten Code aus Monaco holen
  const selection = editor.getSelection();
  const model = editor.getModel();
  const selectedCode = model.getValueInRange(selection);

  // 2. Den kombinierten String erstellen
  let fullText = text;
  if (selectedCode) {
    fullText = text + "\n\n" + selectedCode;
  }

  // 3. In das KI-Textfeld im Editor schreiben (Vorschau)
  textarea.value = fullText;
  textarea.focus();

  // 4. In die ZWISCHENABLAGE kopieren
  try {
    await navigator.clipboard.writeText(fullText);
    showToast("In Zwischenablage kopiert! 📋", "purple");
  } catch (err) {
    console.error('Kopieren fehlgeschlagen:', err);

    // Fallback für ältere Browser oder unsichere Umgebungen
    textarea.select();
    document.execCommand('copy');
    showToast("Manuell kopiert (Fallback)", "blue");
  }

}

// 1. Kontext-Halter für Monaco (angepasst an dein Modell)
function getMonacoContext() {
    if (!editor) return { html: "", css: "", js: "", activeTab: "html" };
    
    // Da du aktuell alles in einer Datei (index.html) hast:
    return {
        html: editor.getValue(),
        css: "", // Falls du später Tabs einbaust, hier erweitern
        js: "",
        activeTab: "index.html"
    };
}

async function sendAI() {
    if (!editor) return;

    const aiInputEl = document.querySelector('textarea.flex-1'); 
    const promptText = aiInputEl.value.trim();
    
    if (!promptText) {
        showToast("Bitte gib einen Prompt ein!", "red");
        return;
    }

    const currentCode = editor.getValue();
    
    // --- NEU: Dynamische Anzeige des Modus im Toast ---
    showToast(`EdgAr (${currentModel.toUpperCase()}) analysiert...`, "blue");

    const fullPrompt = `AKTUELLER CODE:\n${currentCode}\n\nAUFGABE:\n${promptText}\n\nRegel: Nur Code ausgeben.`;

    try {
        const res = await fetch("https://edgaride.vercel.app/api/ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // --- HIER WIRD DAS MODELL JETZT MITGESCHICKT ---
            body: JSON.stringify({ 
                prompt: fullPrompt,
                model: currentModel // Diese Variable wird durch deine neuen Buttons gesetzt
            })
        });

        if (!res.ok) throw new Error("API-Fehler");

        const data = await res.json();
        let aiCode = data.choices[0].message.content;

        // Bereinigung
        aiCode = aiCode.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();

        // --- SICHERUNGSKOPIE FÜR TIME MACHINE ---
        if (typeof codeHistory !== 'undefined') {
            codeHistory.unshift(currentCode); 
            if (codeHistory.length > 10) codeHistory.pop(); 
            if (typeof redoStack !== 'undefined') redoStack = []; 
        }

        aiInputEl.value = aiCode;
        
        editor.executeEdits("ai-update", [{ 
            range: editor.getModel().getFullModelRange(), 
            text: aiCode 
        }]);

        showToast("Code aktualisiert! 🚀", "purple");

        setTimeout(() => {
            if (typeof runCode === "function") runCode(); 
        }, 300);

    } catch (err) {
        console.error(err);
        showToast("KI Fehler - siehe Konsole", "red");
    }
}

function undoAI() {
    if (codeHistory.length === 0) {
        showToast("Kein Rückwärts-Verlauf", "red");
        return;
    }
    const currentCode = editor.getValue();
    redoStack.unshift(currentCode); // Merke dir den jetzigen Stand für Redo!
    
    const lastCode = codeHistory.shift(); 
    editor.setValue(lastCode);
    showToast("Rückgängig gemacht ⏪", "blue");
    setTimeout(() => runCode(), 300);
}

function redoAI() {
    if (redoStack.length === 0) {
        showToast("Nichts zum Wiederholen", "red");
        return;
    }
    const currentCode = editor.getValue();
    codeHistory.unshift(currentCode); // Den aktuellen Stand wieder in die History packen
    
    const nextCode = redoStack.shift(); // Den Code aus dem Redo-Speicher holen
    editor.setValue(nextCode);
    showToast("Wiederholt ⏩", "purple");
    setTimeout(() => runCode(), 300);
}

function clearAIPrompt() {
    const aiInput = document.querySelector('textarea.flex-1');
    if (aiInput) {
        aiInput.value = '';
        aiInput.focus(); // Cursor direkt wieder reinsetzen
        showToast("Eingabe gelöscht 🗑️", "blue");
    }
}

async function magicFix() {
  if (!editor) return;
  const model = editor.getModel();
  const selections = editor.getSelections(); 
  const textarea = document.querySelector('textarea');

  // Fall A: Nichts markiert -> Die ganze Datei optimieren
  if (selections.length === 1 && selections[0].isEmpty()) {
    const fullCode = model.getValue();
    const fixed = applyMagicLogic(fullCode);
    model.setValue(fixed);
    if (textarea) textarea.value = "Datei optimiert:\n\n" + fixed;
  } 
  // Fall B: Mehrfach-Auswahl (z.B. Strg+Klick auf mehrere Funktionen)
  else {
    // WICHTIG: Wir sortieren die Bereiche von UNTEN nach OBEN.
    // So verschieben Änderungen im oberen Bereich nicht die Positionen der unteren.
    const sortedSelections = [...selections].sort((a, b) => b.startLineNumber - a.startLineNumber);

    const edits = sortedSelections.map(sel => {
      const originalText = model.getValueInRange(sel);
      return {
        range: sel,
        text: applyMagicLogic(originalText),
        forceMoveMarkers: false // Marker sollen nicht wild springen
      };
    });

    // Alle Änderungen in einem Rutsch (Undo-Stack freundlich) ausführen
    editor.executeEdits("magic-multi", edits);
  }
  showToast("Struktur perfektioniert! 🪄", "purple");
}

function applyMagicLogic(code) {
  if (!code) return "";
  
  // 1. Grundreinigung (Strings statt Regex, um "missing /" zu vermeiden)
  let formatted = code
    .split('\r\n').join('\n')
    .split('{\s*').join('{\n')
    .split(';\s*').join(';\n');

  // 2. Intelligente Leerzeilen
  let lines = formatted.split('\n');
  let newLines = [];
  for (let i = 0; i < lines.length; i++) {
    let t = lines[i].trim();
    if (i > 0) {
      let prev = lines[i - 1].trim();
      
      // Prüfungen ohne komplexe Regex
      const isJS = t.startsWith('function') || t.startsWith('async') || t.startsWith('class');
      const isCSS = prev === "}" && t !== "" && !t.startsWith('</');
      const isHTML = prev.endsWith('>') && (t.startsWith('<div') || t.startsWith('<section') || t.startsWith('<table'));

      if (isJS || isCSS || isHTML) {
        if (newLines.length > 0 && newLines[newLines.length - 1] !== "") {
          newLines.push("");
        }
      }
    }
    newLines.push(lines[i]);
  }

  // 3. Präzise Einrückung
  let indent = 0;
  return newLines.map(line => {
    let t = line.trim();
    if (t === "") return "";

    let low = t.toLowerCase();
    // Reset bei Sektionen
    if (low.startsWith('<html') || low.startsWith('<body') || low.startsWith('<head') || low.startsWith('<style') || low.startsWith('<script')) {
      indent = 0;
    }

    // RAUSRÜCKEN (Check auf erste Zeichen)
    if (t.startsWith('}') || t.startsWith(']') || t.startsWith(')') || t.startsWith('</')) {
      indent = Math.max(0, indent - 1);
    }

    const res = " ".repeat(indent * 2) + t;

    // EINRÜCKEN (Check auf letzte Zeichen)
    const opensBrace = t.endsWith('{') || t.endsWith('[') || t.endsWith('(');
    const opensTag = t.startsWith('<') && !t.startsWith('</') && !t.endsWith('/>') && !t.includes('</') && !t.startsWith('<!');

    if (opensBrace || opensTag) {
      indent++;
    }

    return res;
  }).join('\n').trim();
}
