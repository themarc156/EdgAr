    <style>
    /* 1. BASIS-LAYOUT */
    body { 
        overflow: hidden; 
        touch-action: manipulation; 
        height: 100dvh; 
        background-color: #090d14; 
        margin: 0;
        display: flex;
        flex-direction: column;
    }

    #editorContainer { 
        flex: 1; 
        position: relative; 
        overflow: hidden; 
        background: #0d1117;
    }

    /* 2. TEXTAREAS (Editor & KI) */
    #mainEditor, #aiInput {
        width: 100%;
        height: 100%;
        outline: none;
        resize: none;
        border: none;
        box-sizing: border-box;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        line-height: 19.5px;
        -webkit-text-size-adjust: none;
    }

    /* Editor-spezifisch (mit Platz für Zeilennummern) */
#mainEditor, #searchBackdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* WICHTIG: Padding, Font und Line-Height müssen auf das Pixel genau identisch sein! */
    padding: 1rem 1rem 1rem 3.5rem !important;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    line-height: 19.5px;
    tab-size: 4;
    white-space: pre;
    overflow-wrap: normal;
    box-sizing: border-box;
}

#mainEditor {
    z-index: 10 !important;
    position: relative;
    display: block !important;
    pointer-events: auto !important;
    background: transparent !important; /* Muss durchsichtig sein */
    color: white;
    caret-color: #3b82f6;
    user-select: text !important;
    -webkit-user-select: text !important;
    touch-action: pan-y !important;
    border: none; /* KEIN RAHMEN HIER */
scrollbar-gutter: stable;
}

#searchBackdrop {
    z-index: 1;
    background: #0d1117; /* Dein Hintergrund */
    color: transparent !important;
    pointer-events: none !important;
-webkit-user-select: none !important;
    -ms-user-select: none !important;
    user-select: none !important;
    overflow: hidden;
    /* FIX: Wir entfernen den Rahmen hier, da er das Backdrop um 2px verschiebt! */
    border: none; 
}

    /* 3. SCHRIFTGRÖSSEN (Mobile First) */
    #mainEditor, #aiInput {
        font-size: 13px;
    }

    /* Optimierung für Desktop (ab 1024px) */
    @media (min-width: 1024px) {
    #mainEditor, #lineNumbers { font-size: 13px; } /* Beide anpassen! */
    #aiInput { font-size: 13px; height: 100% !important; }
}

    /* 4. UI-KOMPONENTEN */
   #lineNumbers {
    position: absolute;
    left: 0;
    top: 0;
    width: 3.5rem;
    background: #0d111a;
    color: #9ca3af;
    font-family: monospace;
    font-size: 13px;
    line-height: 19.5px;
    text-align: right;
    padding-right: 0.5rem;
    padding-top: 1rem; /* MUSS identisch zu Editor padding-top sein! */
    user-select: none;
    border-right: 1px solid #374151;
    z-index: 10;
    white-space: pre;
    
    /* FIX: Die Box ist genau so hoch wie das sichtbare Fenster */
    height: 100%; 
    overflow: hidden; /* Verhindert eigenes Scroll-Verhalten */
will-change: transform; /* wichtig */
    pointer-events: none;
    box-sizing: border-box;
}

    .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; background: #1f2937; }
    input[type="file"] { display: none; }

    /* Suche & Highlights */
mark.search-highlight { 
    background-color: rgba(250, 204, 21, 0.5) !important; /* Halbtransparentes Gelb */
    color: transparent !important; 
    display: inline; /* Zurück auf inline für besseren Textfluss */
    border-radius: 2px;
}

mark.search-current { 
    background-color: rgba(59, 130, 246, 0.8) !important; /* Kräftiges Blau */
    color: transparent !important;
}

    /* Toasts & Animationen */
    .toast { animation: fadeIn 0.3s ease-out, fadeOut 0.3s ease-in 1.7s forwards; z-index: 100; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }

    /* Sperrmodus & Glow */
    .selection-mode { caret-color: transparent !important; }
    @keyframes pulse-blue {
        0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .glow-border { border: 2px solid #3b82f6 !important; animation: pulse-blue 2s infinite; }

/* 5. SCROLLBARS & NAVIGATION */
    
    /* Globales Scrollbar-Styling (für Sidebar etc.) */
    ::-webkit-scrollbar { 
        width: 14px; 
        height: 12px; 
    }
    ::-webkit-scrollbar-track { 
        background: #0d1117; 
    }
    ::-webkit-scrollbar-thumb { 
        background: #484f58; 
        border-radius: 4px; 
        border: 3px solid #0d1117; 
    }
    ::-webkit-scrollbar-thumb:hover { 
        background: #3b82f6; 
    }

    /* Speziell für den Editor (Blau-Akzent) */
    #mainEditor::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.3);
    }
    #mainEditor::-webkit-scrollbar-thumb:hover {
        background: rgba(59, 130, 246, 0.5);
    }

    /* Zahlenbox-Scrollbar verstecken */
    #lineNumbers::-webkit-scrollbar { display: none; }
    #lineNumbers { -ms-overflow-style: none; scrollbar-width: none; }

    /* Die ScrollMap (Interaktive Klick-Zone) */
    #scrollMap {
        position: absolute;
        right: 14px; /* Liegt direkt links neben dem echten Scrollbalken */
        top: 0;
        width: 16px; 
        height: 100%;
        background: rgba(255, 255, 255, 0.01);
        cursor: pointer;
        z-index: 50; /* Über dem Editor, unter der Toolbar */
        border-left: 1px solid rgba(255, 255, 255, 0.05);
        pointer-events: auto !important;
        transition: background 0.2s;
    }

    #scrollMap:hover {
        background: rgba(59, 130, 246, 0.1) !important;
    }

    /* Marker (Sichtbare Suchergebnisse in der Map) */
    .map-marker, 
    [style*="background: orange"], 
    [style*="background: #f59e0b"] {
        position: absolute;
        left: 0;
        width: 100%;
        height: 2px;
        z-index: 51;
        pointer-events: none !important; /* Klick geht DURCH zur Map */
    }

    /* Optionaler Positions-Anzeiger in der Map */
    #scrollMap::after {
        content: '';
        position: absolute;
        left: 0;
        width: 100%;
        height: 20px;
        background: rgba(59, 130, 246, 0.2);
        pointer-events: none;
        display: none;
    }

</style>

    <script>
        let activeTab = localStorage.getItem('sc_activeTab') || 'html';
        let isReadOnly = true; 
        let isFunctionSearch = false; 
        let isSmartSelectActive = false;
        let promptQueue = [];
let snapshotTimer; // Hält die Referenz für die Verzögerung

let fileHandles = {
    html: null,
    css: null,
    js: null
};

// Speichert die echten Dateinamen (standardmäßig Initialwerte)
let fileNames = {
    html: 'index.html',
    css: 'style.css',
    js: 'script.js'
};

        let files = {
            html: `<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1 style="color: #333; margin-top: 20px;">Projekt bereit</h1>\n  <button id="btn" style="padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">Klick mich</button>\n  <script src="script.js"><\/script>\n</body>\n</html>`,
            css: `body { background: #f4f4f4; color: #333; text-align: center; font-family: sans-serif; }\n.openlibrary { border: 1px solid blue; }`,
            js: `function openlibrary() {\n  alert('Funktion gefunden!');\n}\n\ndocument.getElementById('btn').addEventListener('click', () => {\n  openlibrary();\n});`
        };

        let scrollPositions = { html: 0, css: 0, js: 0 };
        let undoStacks = { html: [], css: [], js: [] };
        let redoStacks = { html: [], css: [], js: [] };
        const MAX_HISTORY = 50; 

// Speichert die letzten "Snapshots" der relevanten Blöcke
let codeSnapshots = {
    html: "",
    css: "",
    js: "",
    lastUpdate: 0
};

        let searchMatches = [];
        let currentSearchIndex = -1;

        const savedFiles = localStorage.getItem('sc_project');
        if (savedFiles) files = JSON.parse(savedFiles);
        
        const savedScrolls = localStorage.getItem('sc_scrollPositions');
        if (savedScrolls) scrollPositions = JSON.parse(savedScrolls);

        const editorEl = document.getElementById('mainEditor');
        const backdropEl = document.getElementById('searchBackdrop');
        const lineNumbersEl = document.getElementById('lineNumbers');

        editorEl.value = files[activeTab];
backdropEl.innerText = files[activeTab];

updateLineNumbers(); // ← DAS FEHLT

        undoStacks[activeTab].push(files[activeTab]);

        // --- QUICK PROMPT LOGIK ---
        function applyQuickPrompt(promptText) {
            const aiInp = document.getElementById('aiInput');
            const start = editorEl.selectionStart;
            const end = editorEl.selectionEnd;
            const selectedText = editorEl.value.substring(start, end).trim();

            if (selectedText) {
                // Wenn Text markiert ist, nutzen wir das REPLACE Format
                aiInp.value = `REPLACE: ${selectedText}\n\n${promptText}`;
                showToast("Prompt mit Markierung erstellt", "green");
            } else {
                aiInp.value = promptText;
                showToast("Prompt eingefügt", "blue");
            }
            
            autoResizeAiInput(aiInp);
            toggleSidebar(); // Sidebar schließen für bessere Sicht
        }

        function selectAllCode() {
            editorEl.focus();
            editorEl.setSelectionRange(0, editorEl.value.length);
            showToast("Alles markiert", "blue");
            toggleSidebar();
        }

        function toggleSmartSelect() {
    isSmartSelectActive = !isSmartSelectActive;
isReadOnly = isSmartSelectActive;

    const btn = document.getElementById('smartSelectBtnHeader');
    const icon = document.getElementById('smartSelectIconHeader');

function handleEditorClick(e) {
    // Prüfe: Ist der Button aktiv ODER wird Strg (Windows) / Cmd (Mac) gehalten?
    const isCtrlPressed = e && (e.ctrlKey || e.metaKey);
    
    if (!isSmartSelectActive && !isCtrlPressed) return;

    // Falls Strg gedrückt wurde, verhindern wir, dass der Cursor 
    // einfach nur versetzt wird, damit die Markierung sauber greift.
    if (isCtrlPressed) {
        e.preventDefault();
    }

    const pos = editorEl.selectionStart;
    const text = editorEl.value;
    
    let start = pos;
    let end = pos;

    // Suche nach oben (bis zum Blockanfang oder zwei Zeilenumbrüchen)
    let bracketCount = 0;
    for (let i = pos - 1; i >= 0; i--) {
        if (text[i] === '}') bracketCount++;
        if (text[i] === '{') bracketCount--;

        if (bracketCount <= 0 && text.substring(i - 1, i + 1) === '\n\n') {
            start = i + 1;
            break;
        }
        if (i === 0) start = 0;
    }

    // Suche nach unten (bis zum Blockende oder zwei Zeilenumbrüchen)
    bracketCount = 0;
    for (let i = pos; i < text.length; i++) {
        if (text[i] === '{') bracketCount++;
        if (text[i] === '}') bracketCount--;

        if (bracketCount <= 0 && text.substring(i, i + 2) === '\n\n') {
            end = i;
            break;
        }
        if (i === text.length - 1) end = text.length;
    }

    if (start !== end) {
        editorEl.setSelectionRange(start, end);
        editorEl.focus(); 
        
        const lineCount = text.substring(start, end).split('\n').length;
        const modeLabel = isCtrlPressed ? "Quick-Select" : "Smart-Select";
        showToast(`${modeLabel}: ${lineCount} Zeilen`, "blue");
    }
}



function goToLine() {
    const lineInput = document.getElementById('lineInput');
    const lineNumber = parseInt(lineInput.value);
    if (!lineNumber) return;

    const lines = editorEl.value.split('\n');
    if (lineNumber > 0 && lineNumber <= lines.length) {
        let charIndex = 0;
        for (let i = 0; i < lineNumber - 1; i++) {
            charIndex += lines[i].length + 1;
        }
        editorEl.focus();
        editorEl.setSelectionRange(charIndex, charIndex);
        
        // Scroll-Berechnung
        const lineHeight = 18; // Deine geschätzte Line-Height in px
        editorEl.scrollTop = (lineNumber - 5) * lineHeight; // -5 damit die Zeile nicht ganz oben klebt
        
        showToast(`Zeile ${lineNumber}`, "blue");
        lineInput.value = "";
    } else {
        showToast("Existiert nicht", "red");
    }
}

function handlePaste(e) {
    // 1. Sicherstellen, dass wir den Editor haben
    const editor = e.target; 
    const start = editor.selectionStart;
    const end = editor.selectionEnd;

    // 2. NUR eingreifen, wenn wirklich Text markiert ist
    // Wenn nichts markiert ist, lassen wir den Browser das Standard-Paste machen
    if (start === end) return; 

    // 3. Wenn Text markiert ist, manuell ersetzen
    e.preventDefault();
    const pasteText = (e.clipboardData || window.clipboardData).getData('text');
    const currentText = editor.value;

    editor.value = currentText.substring(0, start) + pasteText + currentText.substring(end);

    // Cursor-Position korrigieren
    const newPos = start + pasteText.length;
    editor.setSelectionRange(newPos, newPos);

    // WICHTIG: Deine Input-Funktion aufrufen, damit Zeilennummern etc. aktualisiert werden
    if (typeof onEditorInput === "function") {
        onEditorInput();
    }
}




        function updateLineNumbers() {
    if (!editorEl || !lineNumbersEl) return;
    
    const lineCount = editorEl.value.split('\n').length;
    
    let nums = [];
for (let i = 1; i <= lineCount; i++) {
    nums.push(i);
}
lineNumbersEl.textContent = nums.join('\n');

    // Nur sync, kein Reset!
    syncScroll();
}

   function syncScroll() {
    if (!editorEl) return;

    const top = editorEl.scrollTop;
    const left = editorEl.scrollLeft;

    // 1. Zeilennummern schieben
    if (lineNumbersEl) {
        lineNumbersEl.scrollTop = top; 
    }

    // 2. Such-Backdrop schieben
    if (backdropEl) {
        backdropEl.scrollTop = top;
        backdropEl.scrollLeft = left;
    }
}

function onEditorScroll() {
    // 1. Synchronisiere Zeilennummern und Backdrop
    if (typeof lineNumbersEl !== 'undefined' && lineNumbersEl) {
        lineNumbersEl.scrollTop = editorEl.scrollTop;
    }
    if (typeof backdropEl !== 'undefined' && backdropEl) {
        backdropEl.scrollTop = editorEl.scrollTop;
        backdropEl.scrollLeft = editorEl.scrollLeft;
    }

    // 2. Speichere die Position für den Tab-Wechsel
    if (typeof activeTab !== 'undefined') {
        scrollPositions[activeTab] = editorEl.scrollTop;
        localStorage.setItem('sc_scrollPositions', JSON.stringify(scrollPositions));
    }
}

function updateScrollMap() {
    const map = document.getElementById('scrollMap');
    if (!map) return;
    map.innerHTML = ''; 

    const text = editorEl.value;
    const totalChars = text.length;
    if (totalChars === 0 || searchMatches.length === 0) return;

    const editorHeight = editorEl.clientHeight;

    searchMatches.forEach((matchIdx, i) => {
        // Wir berechnen die Position basierend auf dem Zeichen-Index im Gesamttext
        const relativePos = matchIdx / totalChars;
        const topPx = relativePos * editorHeight;

        const marker = document.createElement('div');
        marker.className = "scroll-marker"; // Falls du CSS-Klassen nutzen willst
        marker.style.cssText = `
            position: absolute;
            top: ${topPx}px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: ${i === currentSearchIndex ? '#fbbf24' : '#3b82f6'};
            opacity: 0.8;
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
        `;
        
        map.appendChild(marker);
    });
}

        function handleAutoClose(char) {
            const pairs = { '{': '}', '(': ')', '[': ']' };
            if (pairs[char]) {
                const start = editorEl.selectionStart;
                const end = editorEl.selectionEnd;
                const text = editorEl.value;
                editorEl.value = text.substring(0, start) + pairs[char] + text.substring(end);
                editorEl.selectionStart = editorEl.selectionEnd = start;
                backdropEl.innerText = editorEl.value;
            }
        }

function handleScrollMapClick(e) {
    e.stopPropagation();
    e.preventDefault();

    const map = document.getElementById('scrollMap');
    // Wir nutzen hier editorEl, da das deine globale Variable zu sein scheint
    if (!editorEl || !map) return;

    const rect = map.getBoundingClientRect();
    const clickY = e.clientY - rect.top;
    
    // Berechne den Prozentsatz des Klicks innerhalb der Map
    const percentage = Math.max(0, Math.min(1, clickY / rect.height));

    // Die scrollbare Distanz (Inhalt minus sichtbares Fenster)
    const scrollableDistance = editorEl.scrollHeight - editorEl.clientHeight;

    // Den Editor scrollen
    editorEl.scrollTop = percentage * scrollableDistance;

    // Da onEditorScroll() am Editor "lauscht", wird die Synchronisierung 
    // automatisch durch das Setzen von scrollTop ausgelöst.
}

        function saveToUndoStack(code) {
            const stack = undoStacks[activeTab];
            if (stack.length === 0 || stack[stack.length - 1] !== code) {
                stack.push(code);
                if (stack.length > MAX_HISTORY) stack.shift();
                redoStacks[activeTab] = [];
            }
        }

/* --- HISTORIE & NAVIGATION --- */
function undo() {
    const uStack = undoStacks[activeTab];
    const rStack = redoStacks[activeTab];
    if (uStack.length <= 1) { showToast("Nichts zum Rückgängig machen!", "blue"); return; }
    const currentState = uStack.pop();
    rStack.push(currentState);
    const previousState = uStack[uStack.length - 1];
    applyHistoryState(previousState);
    showToast("Rückgängig gemacht", "blue");
}

function redo() {
    const uStack = undoStacks[activeTab];
    const rStack = redoStacks[activeTab];
    if (rStack.length === 0) { showToast("Nichts zum Wiederholen!", "blue"); return; }
    const nextState = rStack.pop();
    uStack.push(nextState);
    applyHistoryState(nextState);
    showToast("Wiederholt", "blue");
}

function applyHistoryState(code) {
    const wasReadOnly = isReadOnly;
    if (wasReadOnly) editorEl.readOnly = false;
    editorEl.value = code;
    files[activeTab] = code;
    localStorage.setItem('sc_project', JSON.stringify(files));
    updateLineNumbers();
    updateSearch();
    if (wasReadOnly) editorEl.readOnly = true;
}

/* --- FORMATIERUNG --- */
function formatCurrentCode() {
    const wasLocked = isReadOnly;
    if (wasLocked) { editorEl.readOnly = false; }
    
    let code = editorEl.value;
    let formatted = '';
    let indentLevel = 0;
    
    const lines = code.split('\n');
    
    for (let i = 0; i < lines.length; i++) {
        let trimmed = lines[i].trim();
        if (!trimmed) continue;

        if (trimmed.startsWith('}') || trimmed.startsWith('</')) { 
            indentLevel = Math.max(0, indentLevel - 1); 
        }

        const isBlockStart = trimmed.includes('function ') || 
                             trimmed.includes('=>') || 
                             (activeTab === 'css' && trimmed.includes('{')) ||
                             (activeTab === 'html' && (trimmed.startsWith('<div') || trimmed.startsWith('<section')));

        if (isBlockStart && formatted !== '') {
            formatted += '\n'; 
        }

        formatted += '  '.repeat(indentLevel) + trimmed + '\n';

        if ((trimmed.endsWith('{') || (trimmed.startsWith('<') && !trimmed.startsWith('</') && !trimmed.endsWith('/>') && !trimmed.includes('</')))) { 
            indentLevel++; 
        }
        
        if (trimmed === '}' || trimmed === '};') {
            formatted += '\n';
        }
    }

    editorEl.value = formatted.replace(/\n{3,}/g, '\n\n').trim() + '\n';
    
    updateCurrentFile();
    updateLineNumbers();
    updateSearch();
    saveToUndoStack(editorEl.value);
    if (wasLocked) { editorEl.readOnly = true; }
    showToast("Code strukturiert ✨", "green");
}

function updateSearch(forceScroll = false) {
    const input = document.getElementById('searchInput');
    if (!input) return;

    const query = input.value.trim();
    const text = editorEl.value;
    searchMatches = [];
    currentSearchIndex = -1;

    clearTimeout(window.historyTimer);
    if (query.length >= 2) {
        window.historyTimer = setTimeout(() => addToHistory(query), 1500);
    }

    if (!query) { 
        backdropEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
        const statusEl = document.getElementById('searchStatus');
        if (statusEl) statusEl.innerText = "0/0"; 
        renderHighlights(); 
        updateScrollMap();
        return; 
    }

    const textLower = text.toLowerCase();
    
    // --- HIER KOMMT DER NEUE BLOCK REIN ---
    if (isFunctionSearch) {
        const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
        let regex;

        if (activeTab === 'js') {
            regex = new RegExp(`(?:function\\s+|const\\s+|let\\s+|var\\s+)${q}[a-zA-Z0-9_$]*`, 'gi');
        } 
        else if (activeTab === 'css') {
            regex = new RegExp(`(?:^|\\s|[>{])([.#]${q}[a-zA-Z0-9_-]*)`, 'gi');
        } 
        else if (activeTab === 'html') {
            regex = new RegExp(`(?:<|id="|class=")${q}[a-zA-Z0-9_$]*`, 'gi');
        }

        if (regex) {
            let match;
            while ((match = regex.exec(text)) !== null) {
                let matchText = match[0];
                let fullMatch = match[1] || match[0]; 
                let nameStart = fullMatch.indexOf(query);
                searchMatches.push(match.index + (matchText.indexOf(fullMatch) + nameStart));
            }
        }
    } else {
        // Normale Textsuche
        let queryLower = query.toLowerCase();
        let index = textLower.indexOf(queryLower);
        while (index !== -1) {
            searchMatches.push(index);
            index = textLower.indexOf(queryLower, index + query.length);
        }
    }
    // --- ENDE DES NEUEN BLOCKS ---

    const statusEl = document.getElementById('searchStatus');
    if (statusEl) {
        statusEl.innerText = searchMatches.length > 0 ? `1/${searchMatches.length}` : "0/0";
    }

    if (searchMatches.length > 0) { 
        currentSearchIndex = 0; 
        selectMatch(forceScroll); 
    } else {
        renderHighlights();
    }
    updateScrollMap();
}

// Speichert den Begriff in der Historie (wird bei Enter oder Fokus-Verlust gerufen)
function addToHistory(query) {
    if (!query || query.length < 2) return;
    
    // Duplikate entfernen
    searchHistory = searchHistory.filter(h => h !== query);
    // Vorne hinzufügen
    searchHistory.unshift(query);
    // Auf 3 begrenzen
    if (searchHistory.length > 3) searchHistory.pop();
    
    localStorage.setItem('sc_searchHistory', JSON.stringify(searchHistory));
    renderHistory();
}

function renderHistory() {
    const container = document.getElementById('searchHistory');
    container.innerHTML = '';
    
    searchHistory.forEach(term => {
        const badge = document.createElement('button');
        badge.className = "bg-gray-700 hover:bg-blue-900/50 text-[10px] px-2 py-0.5 rounded text-gray-300 border border-gray-600 transition truncate max-w-[100px]";
        badge.innerText = term;
        badge.onclick = () => {
    const input = document.getElementById('searchInput');
    input.value = term;
    input.focus(); 
    // Das 'true' hier sorgt dafür, dass EdgAr sofort zum Treffer springt!
    updateSearch(true); 
};
        container.appendChild(badge);
    });
}

// Initial beim Laden einmal rendern
renderHistory();

function renderHighlights() {
    const query = document.getElementById('searchInput').value;
    const text = editorEl.value;

    // GEÄNDERT: Die Prüfung auf 'searchPanel' wurde entfernt.
    // Wir prüfen nur noch, ob eine Query existiert und ob Treffer da sind.
    if (!query || searchMatches.length === 0) {
        backdropEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
        return;
    }

    let resultHtml = "";
    let lastIdx = 0;

    searchMatches.forEach((matchIdx, i) => {
        // Text vor dem Treffer
        resultHtml += escapeHtml(text.substring(lastIdx, matchIdx));
        
        let matchLength = query.length;
        
        // Sonderlogik für Funktionssuche: Markiere das ganze Wort
        if (isFunctionSearch) {
            const remainingText = text.substring(matchIdx);
            const wordMatch = remainingText.match(/^[a-zA-Z0-9_$.#<>="-]*/);
            if (wordMatch) {
                matchLength = wordMatch[0].length;
            }
        }

        const matchText = text.substring(matchIdx, matchIdx + matchLength);
        const isCurrent = i === currentSearchIndex;

        // Hier wird das <mark> Tag gesetzt
        resultHtml += `<mark class="search-highlight ${isCurrent ? 'search-current' : ''}">${escapeHtml(matchText)}</mark>`;
        lastIdx = matchIdx + matchLength;
    });

    // Restlicher Text nach dem letzten Treffer
    resultHtml += escapeHtml(text.substring(lastIdx));
    
    // In das Backdrop-Element schreiben und Zeilenumbrüche fixen
    // Das zusätzliche Leerzeichen am Ende verhindert Scroll-Glitch bei manchen Browsern
    backdropEl.innerHTML = resultHtml.replace(/\n/g, '<br>') + " "; 
    
    console.log("Anzahl Treffer im Backdrop:", backdropEl.querySelectorAll('mark').length);
}

        function splitHtmlStructure() {
            let sourceHtml = files.html;
            const styleRegex = /<style([^>]*)>([\s\S]*?)<\/style>/gi;
            const scriptRegex = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
            let extractedCss = "";
            let extractedJs = "";
            let scriptAttributes = ""; 
            let match;
            while ((match = styleRegex.exec(sourceHtml)) !== null) {
                extractedCss += `/* Block-Attribute: ${match[1].trim()} */\n` + match[2].trim() + "\n\n";
            }
            while ((match = scriptRegex.exec(sourceHtml)) !== null) {
                if (!scriptAttributes && !match[1].includes('src=')) { scriptAttributes = match[1].trim(); }
                extractedJs += `// Block-Attribute: ${match[1].trim()}\n` + match[2].trim() + "\n\n";
            }
            let cleanedHtml = sourceHtml.replace(styleRegex, '').replace(scriptRegex, '');
            if (!extractedCss && !extractedJs) { showToast("Nichts zum Zerlegen gefunden!", "blue"); return; }
            const hasCssLink = /<link[^>]*href=["']style\.css["'][^>]*>/i.test(cleanedHtml);
            const hasJsLink = /<script[^>]*src=["']script\.js["'][^>]*>/i.test(cleanedHtml);
            if (!hasCssLink && extractedCss) {
                cleanedHtml = cleanedHtml.replace(/<\/head>/i, '  <link rel="stylesheet" href="style.css">\n</head>');
            }
            if (!hasJsLink && extractedJs) {
                const attrString = scriptAttributes ? " " + scriptAttributes : "";
                cleanedHtml = cleanedHtml.replace(/<\/body>/i, `  <script src="script.js"${attrString}><\/script>\n</body>`);
            }
            files.html = cleanedHtml;
            if (extractedCss) files.css = (files.css.trim() ? files.css + "\n\n" : "") + extractedCss.trim();
            if (extractedJs) files.js = (files.js.trim() ? files.js + "\n\n" : "") + extractedJs.trim();
            undoStacks.html.push(files.html);
            undoStacks.css.push(files.css);
            undoStacks.js.push(files.js);
            localStorage.setItem('sc_project', JSON.stringify(files));
            showToast("HTML vollständig zerlegt!", "green");
            switchTab(activeTab, true); 
        }

        function smartMerge() {
            const aiCode = document.getElementById('aiInput').value.trim();
            if (!aiCode) return;
            const lines = aiCode.split('\n');
            let replaceKeyword = null;
            let processableCode = aiCode;
            if (lines[0].startsWith("REPLACE: ")) {
                replaceKeyword = lines[0].substring(9).trim();
                lines.shift(); 
                processableCode = lines.join('\n').trim();
            }
            const cssRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
            const jsRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
            let cssChunks = [];
            let jsChunks = [];
            let match;
            while ((match = cssRegex.exec(processableCode)) !== null) { cssChunks.push(match[1].trim()); }
            while ((match = jsRegex.exec(processableCode)) !== null) { jsChunks.push(match[1].trim()); }
            let htmlChunk = processableCode.replace(cssRegex, "").replace(jsRegex, "").trim();
            const wasReadOnly = isReadOnly;
            if (wasReadOnly) { isReadOnly = false; editorEl.readOnly = false; }
            if (cssChunks.length > 0) {
                let newCss = cssChunks.join("\n\n");
                const classRegex = /\.([a-zA-Z0-9_-]+)\s*\{[\s\S]*?\}/g;
                let cssMatch;
                while ((cssMatch = classRegex.exec(newCss)) !== null) {
                    const className = cssMatch[1];
                    const existingRegex = new RegExp(`\\.${className}\\s*\\{[\\s\\S]*?\\}`, 'g');
                    if (existingRegex.test(files.css)) {
                        files.css = files.css.replace(existingRegex, cssMatch[0]);
                        showToast(`CSS .${className} aktualisiert`, "green");
                        newCss = newCss.replace(cssMatch[0], "").trim();
                    }
                }
                if (newCss.length > 0) {
                    files.css += (files.css ? "\n\n" : "") + newCss;
                    showToast("CSS ergänzt", "green");
                }
                undoStacks.css.push(files.css);
            }
            if (jsChunks.length > 0) {
                let newJs = jsChunks.join("\n\n");
                const funcRegex = /function\s+([a-zA-Z0-9_]+)\s*\([\s\S]*?\{[\s\S]*?\}/g;
                let jsMatch;
                while ((jsMatch = funcRegex.exec(newJs)) !== null) {
                    const funcName = jsMatch[1];
                    const existingRegex = new RegExp(`function\\s+${funcName}\\s*\\([\\s\\S]*?\\{[\\s\\S]*?\\}`, 'g');
                    if (existingRegex.test(files.js)) {
                        files.js = files.js.replace(existingRegex, jsMatch[0]);
                        showToast(`JS ${funcName}() aktualisiert`, "green");
                        newJs = newJs.replace(jsMatch[0], "").trim();
                    }
                }
                if (newJs.length > 0) {
                    files.js += (files.js ? "\n\n" : "") + newJs;
                    showToast("JS ergänzt", "green");
                }
                undoStacks.js.push(files.js);
            }
            if (htmlChunk.length > 0) {
                const currentHtml = files.html;
                if (replaceKeyword && currentHtml.indexOf(replaceKeyword) !== -1) {
                    files.html = currentHtml.replace(replaceKeyword, htmlChunk);
                    showToast("Code ersetzt", "green");
                } else {
                    files.html += "\n" + htmlChunk;
                    showToast("HTML ergänzt", "green");
                }
                undoStacks.html.push(files.html);
            }
            localStorage.setItem('sc_project', JSON.stringify(files));
            switchTab(activeTab, true);
            document.getElementById('aiInput').value = "";
            if (wasReadOnly) toggleEditMode(); 
        }

            const fullJsCode = errorTracker + files.js;

        }

async function sendAI() {
// WICHTIG: Speichert den aktuellen Editor-Inhalt in das 'files' Objekt

    // 1. Prompt-Check
    if (promptQueue.length === 0) {
        const currentInput = document.getElementById("aiInput").value.trim();
        if (currentInput) {
            promptQueue.push(currentInput);
        } else {
            showToast("Keine Prompts!", "red");
            return;
        }
    }

    const mode = document.getElementById("aiMode").value;
    
    // 2. SNAPSHOT-LOGIK: Wir holen den aktuellen Stand ALLER Dateien
    // 'files' ist dein globales Objekt, das html, css und js speichert
    const contextHtml = files.html || "";
    const contextCss = files.css || "";
    const contextJs = files.js || "";

    showToast("KI analysiert Projekt...", "blue");

    // 3. PROMPT-AUFBAU: Die KI erhält nun das komplette Bild
    const fullPrompt = `
You are an expert web developer. Below is the current state of the project.

### PROJECT CONTEXT ###
[FILE: index.html]
${contextHtml}

[FILE: style.css]
${contextCss}

[FILE: script.js]
${contextJs}
#######################

Tasks:
${promptQueue.map((p, i) => `${i + 1}. ${p}`).join("\n")}

Rules:
- Return ONLY the code for the changes.
- If the task spans multiple files, provide the code blocks clearly labeled.
- Improve structure and maintain consistency with the existing context.
`;

    console.log("Sending Snapshot-Request:", fullPrompt);

    try {
        const res = await fetch("https://edgaride.vercel.app/api/ai", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                prompt: fullPrompt,
                mode: mode
            })
        });

        const data = await res.json();

        if (!res.ok) {
            showToast(`Fehler: ${data.error || "Server-Fehler"}`, "red");
            return;
        }

        const aiCode = data.choices[0].message.content;

        // Antwort ins Feld eintragen

        autoResizeAiInput(document.getElementById('aiInput'));

        promptQueue = [];
        showToast("Antwort mit Kontext erhalten 🚀", "green");

    } catch (err) {
        console.error(err);
        showToast("KI Fehler", "red");
    }
}





        function saveAsProject() {
            updateCurrentFile();

            let filename = "";
            let mimeType = "";
            const loadedFileName = localStorage.getItem('sc_loadedFileName') || 'index';
            if (activeTab === 'html') { filename = `${loadedFileName}.html`; mimeType = "text/html"; } 
            else if (activeTab === 'css') { filename = (loadedFileName === 'index') ? "style.css" : `${loadedFileName}.css`; mimeType = "text/css"; } 
            else if (activeTab === 'js') { filename = (loadedFileName === 'index') ? "script.js" : `${loadedFileName}.js`; mimeType = "application/javascript"; }
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            a.style.display = 'none'; document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            showToast(`${filename} wurde heruntergeladen!`, "green");
        }

        const name = file.name.toLowerCase();
        let type = '';

        if (name.endsWith('.html')) type = 'html';
        else if (name.endsWith('.css')) type = 'css';
        else if (name.endsWith('.js')) type = 'js';

        if (type) {
            const reader = new FileReader();

                files[type] = e.target.result;

                    updateFileNameUI();

    }
