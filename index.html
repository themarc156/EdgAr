<!DOCTYPE html>

<head>

    <title>EdgAr - Mobile IDE v3.9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    /* 1. BASIS-LAYOUT */
    body { 
        overflow: hidden; 
        touch-action: manipulation; 
        height: 100dvh; 
        background-color: #090d14; 
        margin: 0;
        display: flex;
        flex-direction: column;
    }

    #editorContainer { 
        flex: 1; 
        position: relative; 
        overflow: hidden; 
        background: #0d1117;
    }

    /* 2. TEXTAREAS (Editor & KI) */
    #mainEditor, #aiInput {
        width: 100%;
        height: 100%;
        outline: none;
        resize: none;
        border: none;
        box-sizing: border-box;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        line-height: 1.5;
        -webkit-text-size-adjust: none;
    }

    /* Editor-spezifisch (mit Platz für Zeilennummern) */
    #mainEditor, #searchBackdrop {
        position: absolute;
        top: 0;
        left: 0;
        padding: 1rem 1rem 1rem 3.5rem !important;
        tab-size: 4;
        white-space: pre;
        overflow-wrap: normal;
    }

    #mainEditor {
        z-index: 2;
        background: transparent !important;
        color: white;
        caret-color: #3b82f6;
        user-select: text !important;
        -webkit-user-select: text !important;
        touch-action: pan-y !important;
    }

    #searchBackdrop {
        z-index: 1;
        background: #090d14;
        color: transparent;
        pointer-events: none !important;
        user-select: none;
    }

    /* 3. SCHRIFTGRÖSSEN (Mobile First) */
    #mainEditor, #aiInput {
        font-size: 13px;
    }

    /* Optimierung für Desktop (ab 1024px) */
    @media (min-width: 1024px) {
    #mainEditor, #lineNumbers { font-size: 15px; } /* Beide anpassen! */
    #aiInput { font-size: 14px; height: 100% !important; }
}

    /* 4. UI-KOMPONENTEN */
   #lineNumbers {
    position: absolute;
    left: 0;
    top: 0;
    width: 3.5rem;
    background: #0d111a;
    color: #9ca3af;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.5;
    text-align: right;
    padding-right: 0.5rem;
    padding-top: 1rem; /* MUSS identisch zu Editor padding-top sein! */
    user-select: none;
    border-right: 1px solid #374151;
    z-index: 10;
    white-space: pre;
    
    /* FIX: Die Box ist genau so hoch wie das sichtbare Fenster */
    height: 100%; 
    overflow: hidden; /* Verhindert eigenes Scroll-Verhalten */
    pointer-events: none;
    box-sizing: border-box;
}

    .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; background: #1f2937; }
    input[type="file"] { display: none; }

    /* Suche & Highlights */
    mark.search-highlight { background-color: #facc15; color: #000; border-radius: 2px; }
    mark.search-current { background-color: #f97316; color: #000; }

    /* Toasts & Animationen */
    .toast { animation: fadeIn 0.3s ease-out, fadeOut 0.3s ease-in 1.7s forwards; z-index: 100; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }

    /* Sperrmodus & Glow */
    .selection-mode { caret-color: transparent !important; }
    @keyframes pulse-blue {
        0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .glow-border { border: 2px solid #3b82f6 !important; animation: pulse-blue 2s infinite; }

    /* 5. SCROLLBARS */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

/* Verhindert das Standard-Scrollen der Zahlenbox durch den Nutzer, 
   da dies nur per JS synchronisiert werden soll */
#lineNumbers::-webkit-scrollbar {
    display: none;
}
#lineNumbers {
    -ms-overflow-style: none;
    scrollbar-width: none;
}

</style>
</head>

    <script>
        let activeTab = localStorage.getItem('sc_activeTab') || 'html';
        let isReadOnly = true; 
        let isFunctionSearch = false; 
        let isSmartSelectActive = false;
        let promptQueue = [];

        let files = {
            html: `<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1 style="color: #333; margin-top: 20px;">Projekt bereit</h1>\n  <button id="btn" style="padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">Klick mich</button>\n  <script src="script.js"><\/script>\n</body>\n</html>`,
            css: `body { background: #f4f4f4; color: #333; text-align: center; font-family: sans-serif; }\n.openlibrary { border: 1px solid blue; }`,
            js: `function openlibrary() {\n  alert('Funktion gefunden!');\n}\n\ndocument.getElementById('btn').addEventListener('click', () => {\n  openlibrary();\n});`
        };

        let scrollPositions = { html: 0, css: 0, js: 0 };
        let undoStacks = { html: [], css: [], js: [] };
        let redoStacks = { html: [], css: [], js: [] };
        const MAX_HISTORY = 50; 

        let searchMatches = [];
        let currentSearchIndex = -1;

        const savedFiles = localStorage.getItem('sc_project');
        if (savedFiles) files = JSON.parse(savedFiles);
        
        const savedScrolls = localStorage.getItem('sc_scrollPositions');
        if (savedScrolls) scrollPositions = JSON.parse(savedScrolls);

        const editorEl = document.getElementById('mainEditor');
        const backdropEl = document.getElementById('searchBackdrop');
        const lineNumbersEl = document.getElementById('lineNumbers');

        editorEl.value = files[activeTab];
        backdropEl.innerText = files[activeTab];

        undoStacks[activeTab].push(files[activeTab]);

        // --- QUICK PROMPT LOGIK ---
        function applyQuickPrompt(promptText) {
            const aiInp = document.getElementById('aiInput');
            const start = editorEl.selectionStart;
            const end = editorEl.selectionEnd;
            const selectedText = editorEl.value.substring(start, end).trim();

            if (selectedText) {
                // Wenn Text markiert ist, nutzen wir das REPLACE Format
                aiInp.value = `REPLACE: ${selectedText}\n\n${promptText}`;
                showToast("Prompt mit Markierung erstellt", "green");
            } else {
                aiInp.value = promptText;
                showToast("Prompt eingefügt", "blue");
            }
            
            autoResizeAiInput(aiInp);
            toggleSidebar(); // Sidebar schließen für bessere Sicht
        }

        function selectAllCode() {
            editorEl.focus();
            editorEl.setSelectionRange(0, editorEl.value.length);
            showToast("Alles markiert", "blue");
            toggleSidebar();
        }

        function toggleSmartSelect() {
            isSmartSelectActive = !isSmartSelectActive;
            const btn = document.getElementById('smartSelectBtn');
            const status = document.getElementById('smartStatus');
            const icon = document.getElementById('smartSelectIcon');

            if (isSmartSelectActive) {
                status.innerText = "ON";
                status.classList.replace('bg-gray-700', 'bg-blue-600');
                icon.classList.replace('text-gray-500', 'text-blue-400');
                showToast("Bereich-Auswahl aktiviert", "blue");
            } else {
                status.innerText = "OFF";
                status.classList.replace('bg-blue-600', 'bg-gray-700');
                icon.classList.replace('text-blue-400', 'text-gray-500');
                showToast("Bereich-Auswahl deaktiviert", "blue");
            }
        }

        function handleEditorClick() {
    if (!isSmartSelectActive) return;

    const pos = editorEl.selectionStart;
    const text = editorEl.value;
    
    let start = pos;
    let end = pos;

    // Suche nach oben
    let bracketCount = 0;
    for (let i = pos - 1; i >= 0; i--) {
        if (text[i] === '}') bracketCount++;
        if (text[i] === '{') bracketCount--;

        if (bracketCount <= 0 && text.substring(i - 1, i + 1) === '\n\n') {
            start = i + 1;
            break;
        }
        if (i === 0) start = 0;
    }

    // Suche nach unten
    bracketCount = 0;
    for (let i = pos; i < text.length; i++) {
        if (text[i] === '{') bracketCount++;
        if (text[i] === '}') bracketCount--;

        if (bracketCount <= 0 && text.substring(i, i + 2) === '\n\n') {
            end = i;
            break;
        }
        if (i === text.length - 1) end = text.length;
    }

    // Nur setzen, wenn tatsächlich ein Bereich gefunden wurde, 
    // um ein "Zucken" der Markierung zu verhindern
    if (start !== end) {
        editorEl.setSelectionRange(start, end);
        // Fokus behalten, damit die Markierung sichtbar bleibt
        editorEl.focus(); 
        const lineCount = text.substring(start, end).split('\n').length;
        showToast(`Block markiert (${lineCount} Zeilen)`, "blue");
    }
}




        function autoResizeAiInput(el) {
    // Wenn wir auf einem Tablet/Smartphone sind (Breite < 768px)
    if (window.innerWidth < 768) {
        el.style.height = '40px'; 
        const newHeight = Math.min(el.scrollHeight, 150); 
        el.style.height = newHeight + 'px';
    } else {
        // Auf dem PC/Laptop: 
        // Wir entfernen die festen Pixel-Werte, damit "flex-1" (CSS) 
        // das Feld automatisch auf die volle verfügbare Höhe streckt.
        el.style.height = ''; 
    }
}

        function showToast(msg, type = "blue") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { blue: "bg-blue-600 text-white", green: "bg-green-600 text-white", red: "bg-red-600 text-white" };
            toast.className = `${colors[type]} text-xs font-semibold px-4 py-2 rounded-md shadow-lg toast`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 2000);
        }

        function toggleSidebar() {
            const overlay = document.getElementById('sidebarOverlay');
            const sidebar = document.getElementById('sidebar');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => { sidebar.classList.remove('-translate-x-full'); }, 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                setTimeout(() => { overlay.classList.add('hidden'); }, 300);
            }
        }

        function toggleEditMode() {
    const btn = document.getElementById('lockBtn');
    isReadOnly = !isReadOnly;
    
    if (isReadOnly) {
        // SPERRMODUS
        editorEl.readOnly = false; 
        editorEl.setAttribute('inputmode', 'none');
        editorEl.classList.add('selection-mode');
        
        // Rahmen-Leuchten entfernen
        btn.classList.remove('glow-border', 'bg-blue-600');
        btn.classList.add('bg-gray-700');
        
        showToast("Modus: Markieren", "blue");
    } else {
        // SCHREIBMODUS
        editorEl.readOnly = false;
        editorEl.removeAttribute('inputmode');
        editorEl.classList.remove('selection-mode');
        
        // Rahmen-Leuchten hinzufügen & Hintergrund leicht ändern
        btn.classList.add('glow-border', 'bg-blue-600');
        btn.classList.remove('bg-gray-700');
        
        editorEl.focus();
        showToast("Modus: Schreiben", "green");
    }
}








        function updateLineNumbers() {
    if (!editorEl || !lineNumbersEl) return;
    
    const lines = editorEl.value.split('\n');
    const lineCount = lines.length;
    
    // 1. Zahlen generieren
    let numStr = '';
    for (let i = 1; i <= lineCount; i++) {
        numStr += i + '\n';
    }
    lineNumbersEl.textContent = numStr;

    // 2. WICHTIG: Den internen Scroll-Versatz der Zahlenbox eliminieren
    // Das verhindert, dass die Zählung plötzlich bei 82 startet.
    lineNumbersEl.scrollTop = 0;

    // 3. Die vertikale Position an den Editor koppeln
    // Falls du in syncScroll() bereits scrollTop setzt, reicht das hier:
    syncScroll();
}

   function syncScroll() {
    if (!editorEl) return;

    // 1. Synchronisiere die Zeilennummern (vertikal)
    if (lineNumbersEl) {
        // Wir setzen die Position hart auf den Wert des Editors
        lineNumbersEl.scrollTop = editorEl.scrollTop;
    }

    // 2. Synchronisiere das Such-Backdrop (vertikal & horizontal)
    if (backdropEl) {
        backdropEl.scrollTop = editorEl.scrollTop;
        backdropEl.scrollLeft = editorEl.scrollLeft;
    }
}

        function onEditorScroll() {
            syncScroll();
            scrollPositions[activeTab] = editorEl.scrollTop;

        function handleAutoClose(char) {
            const pairs = { '{': '}', '(': ')', '[': ']' };
            if (pairs[char]) {
                const start = editorEl.selectionStart;
                const end = editorEl.selectionEnd;
                const text = editorEl.value;
                editorEl.value = text.substring(0, start) + pairs[char] + text.substring(end);
                editorEl.selectionStart = editorEl.selectionEnd = start;
                backdropEl.innerText = editorEl.value;
            }
        }

        function saveToUndoStack(code) {
            const stack = undoStacks[activeTab];
            if (stack.length === 0 || stack[stack.length - 1] !== code) {
                stack.push(code);
                if (stack.length > MAX_HISTORY) stack.shift();
                redoStacks[activeTab] = [];
            }
        }

        function undo() {
            const uStack = undoStacks[activeTab];
            const rStack = redoStacks[activeTab];
            if (uStack.length <= 1) { showToast("Nichts zum Rückgängig machen!", "blue"); return; }
            const currentState = uStack.pop();
            rStack.push(currentState);
            const previousState = uStack[uStack.length - 1];
            applyHistoryState(previousState);
            showToast("Rückgängig gemacht", "blue");
        }

        function redo() {
            const uStack = undoStacks[activeTab];
            const rStack = redoStacks[activeTab];
            if (rStack.length === 0) { showToast("Nichts zum Wiederholen!", "blue"); return; }
            const nextState = rStack.pop();
            uStack.push(nextState);
            applyHistoryState(nextState);
            showToast("Wiederholt", "blue");
        }

        function applyHistoryState(code) {
            const wasReadOnly = isReadOnly;
            if (wasReadOnly) editorEl.readOnly = false;
            editorEl.value = code;

        }

        function formatCurrentCode() {
    const wasLocked = isReadOnly;
    if (wasLocked) { editorEl.readOnly = false; }
    
    let code = editorEl.value;
    let formatted = '';
    let indentLevel = 0;
    
    // 1. Schritt: Code in Zeilen zerlegen und unnötige Leerzeichen/Leerzeilen entfernen
    const lines = code.split('\n');
    
    for (let i = 0; i < lines.length; i++) {
        let trimmed = lines[i].trim();
        
        // Wenn die Zeile leer ist, ignorieren wir sie (wir setzen sie später strategisch neu)
        if (!trimmed) continue;

        // Einrücken verringern, wenn Block endet
        if (trimmed.startsWith('}') || trimmed.startsWith('</')) { 
            indentLevel = Math.max(0, indentLevel - 1); 
        }

        // --- STRATEGISCHE LEERZEILEN LOGIK ---
        // Füge Leerzeile VOR wichtigen Blöcken ein (außer es ist die erste Zeile)
        const isBlockStart = trimmed.includes('function ') || 
                             trimmed.includes('=>') || 
                             (activeTab === 'css' && trimmed.includes('{')) ||
                             (activeTab === 'html' && trimmed.startsWith('<div') || trimmed.startsWith('<section'));

        if (isBlockStart && formatted !== '') {
            formatted += '\n'; 
        }

        // Die eigentliche Zeile mit korrektem Indent hinzufügen
        formatted += '  '.repeat(indentLevel) + trimmed + '\n';

        // Einrücken erhöhen, wenn Block startet
        if ((trimmed.endsWith('{') || (trimmed.startsWith('<') && !trimmed.startsWith('</') && !trimmed.endsWith('/>') && !trimmed.includes('</')))) { 
            indentLevel++; 
        }
        
        // Füge Leerzeile NACH schließenden Klammern ein
        if (trimmed === '}' || trimmed === '};') {
            formatted += '\n';
        }
    }

    // Finale Bereinigung: Doppelte Leerzeilen zu einer machen
    editorEl.value = formatted.replace(/\n{3,}/g, '\n\n').trim() + '\n';
    
    updateCurrentFile();
    updateLineNumbers();
    updateSearch();
    saveToUndoStack(editorEl.value);
    if (wasLocked) { editorEl.readOnly = true; }
    showToast("Code strukturiert ✨", "green");
}

        function updateSearch() {
    const input = document.getElementById('searchInput');
    const query = input.value.trim();
    const text = editorEl.value;
    searchMatches = [];
    currentSearchIndex = -1;

    // --- NEU: Historie-Logik ---
    // Wir warten 1,5 Sekunden nach dem Tippen, bevor wir den Begriff in die Top 3 aufnehmen
    clearTimeout(window.historyTimer);
    if (query.length >= 2) {
        window.historyTimer = setTimeout(() => addToHistory(query), 1500);
    }
    // ---------------------------

    if (!query || document.getElementById('searchPanel').classList.contains('hidden')) { 
        backdropEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
        document.getElementById('searchStatus').innerText = "0/0"; 
        return; 
    }

    const textLower = text.toLowerCase();
    let queryLower = query.toLowerCase();

            if (isFunctionSearch) {
        let regex;
        // Sicherer Regex-String (escaped Sonderzeichen)
        const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 

        if (activeTab === 'js') {
            // JS-Modus: function, const, let, var
            regex = new RegExp(`(?:function\\s+|const\\s+|let\\s+|var\\s+)[a-zA-Z0-9_$]*${q}[a-zA-Z0-9_$]*`, 'gi');
        } 
        else if (activeTab === 'css') {
            // CSS-Modus: Klassen . und IDs #
            regex = new RegExp(`[.#][a-zA-Z0-9_-]*${q}[a-zA-Z0-9_-]*`, 'gi');
        } 
        else if (activeTab === 'html') {
            // HTML-Modus: Findet Tags <, IDs id=" UND JS-Funktionen (wichtig vor dem Split!)
            regex = new RegExp(`(?:<|id="|function\\s+|const\\s+|let\\s+|var\\s+)[a-zA-Z0-9_$]*${q}[a-zA-Z0-9_$]*`, 'gi');
        }

        if (regex) {
            let match;
            while ((match = regex.exec(text)) !== null) {
                let fullMatch = match[0];
                // Offset-Erkennung: Wir springen über das Keyword (z.B. "function ") direkt zum Namen
                let keywordMatch = fullMatch.match(/^(?:function\\s+|const\\s+|let\\s+|var\\s+|<|id=")/i);
                let offset = keywordMatch ? keywordMatch[0].length : 0;
                
                searchMatches.push(match.index + offset);
            }
        }
    } else {
        // Normale Suche (wenn ƒ-Button aus ist)
        let index = textLower.indexOf(queryLower);
        while (index !== -1) {
            searchMatches.push(index);
            index = textLower.indexOf(queryLower, index + query.length);
        }
    }


    document.getElementById('searchStatus').innerText = searchMatches.length > 0 ? `1/${searchMatches.length}` : "0/0";
    if (searchMatches.length > 0) { 
        currentSearchIndex = 0; 
        selectMatch(); 
    }
    renderHighlights();
} // <-- Diese Klammer hat in deinem Post gefehlt!

function addToHistory(query) {
    if (!query || query.length < 2) return;
    
    // Duplikate entfernen
    searchHistory = searchHistory.filter(h => h !== query);
    // Vorne hinzufügen
    searchHistory.unshift(query);
    // Auf 3 begrenzen
    if (searchHistory.length > 3) searchHistory.pop();
    
    localStorage.setItem('sc_searchHistory', JSON.stringify(searchHistory));
    renderHistory();
}

        function splitHtmlStructure() {
            let sourceHtml = files.html;
            const styleRegex = /<style([^>]*)>([\s\S]*?)<\/style>/gi;
            const scriptRegex = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
            let extractedCss = "";
            let extractedJs = "";
            let scriptAttributes = ""; 
            let match;
            while ((match = styleRegex.exec(sourceHtml)) !== null) {
                extractedCss += `/* Block-Attribute: ${match[1].trim()} */\n` + match[2].trim() + "\n\n";
            }
            while ((match = scriptRegex.exec(sourceHtml)) !== null) {
                if (!scriptAttributes && !match[1].includes('src=')) { scriptAttributes = match[1].trim(); }
                extractedJs += `// Block-Attribute: ${match[1].trim()}\n` + match[2].trim() + "\n\n";
            }
            let cleanedHtml = sourceHtml.replace(styleRegex, '').replace(scriptRegex, '');
            if (!extractedCss && !extractedJs) { showToast("Nichts zum Zerlegen gefunden!", "blue"); return; }
            const hasCssLink = /<link[^>]*href=["']style\.css["'][^>]*>/i.test(cleanedHtml);
            const hasJsLink = /<script[^>]*src=["']script\.js["'][^>]*>/i.test(cleanedHtml);
            if (!hasCssLink && extractedCss) {
                cleanedHtml = cleanedHtml.replace(/<\/head>/i, '  <link rel="stylesheet" href="style.css">\n</head>');
            }
            if (!hasJsLink && extractedJs) {
                const attrString = scriptAttributes ? " " + scriptAttributes : "";
                cleanedHtml = cleanedHtml.replace(/<\/body>/i, `  <script src="script.js"${attrString}><\/script>\n</body>`);
            }
            files.html = cleanedHtml;
            if (extractedCss) files.css = (files.css.trim() ? files.css + "\n\n" : "") + extractedCss.trim();
            if (extractedJs) files.js = (files.js.trim() ? files.js + "\n\n" : "") + extractedJs.trim();
            undoStacks.html.push(files.html);
            undoStacks.css.push(files.css);
            undoStacks.js.push(files.js);
            localStorage.setItem('sc_project', JSON.stringify(files));
            showToast("HTML vollständig zerlegt!", "green");
            switchTab(activeTab, true); 
        }

        function smartMerge() {
            const aiCode = document.getElementById('aiInput').value.trim();
            if (!aiCode) return;
            const lines = aiCode.split('\n');
            let replaceKeyword = null;
            let processableCode = aiCode;
            if (lines[0].startsWith("REPLACE: ")) {
                replaceKeyword = lines[0].substring(9).trim();
                lines.shift(); 
                processableCode = lines.join('\n').trim();
            }
            const cssRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
            const jsRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
            let cssChunks = [];
            let jsChunks = [];
            let match;
            while ((match = cssRegex.exec(processableCode)) !== null) { cssChunks.push(match[1].trim()); }
            while ((match = jsRegex.exec(processableCode)) !== null) { jsChunks.push(match[1].trim()); }
            let htmlChunk = processableCode.replace(cssRegex, "").replace(jsRegex, "").trim();
            const wasReadOnly = isReadOnly;
            if (wasReadOnly) { isReadOnly = false; editorEl.readOnly = false; }
            if (cssChunks.length > 0) {
                let newCss = cssChunks.join("\n\n");
                const classRegex = /\.([a-zA-Z0-9_-]+)\s*\{[\s\S]*?\}/g;
                let cssMatch;
                while ((cssMatch = classRegex.exec(newCss)) !== null) {
                    const className = cssMatch[1];
                    const existingRegex = new RegExp(`\\.${className}\\s*\\{[\\s\\S]*?\\}`, 'g');
                    if (existingRegex.test(files.css)) {
                        files.css = files.css.replace(existingRegex, cssMatch[0]);
                        showToast(`CSS .${className} aktualisiert`, "green");
                        newCss = newCss.replace(cssMatch[0], "").trim();
                    }
                }
                if (newCss.length > 0) {
                    files.css += (files.css ? "\n\n" : "") + newCss;
                    showToast("CSS ergänzt", "green");
                }
                undoStacks.css.push(files.css);
            }
            if (jsChunks.length > 0) {
                let newJs = jsChunks.join("\n\n");
                const funcRegex = /function\s+([a-zA-Z0-9_]+)\s*\([\s\S]*?\{[\s\S]*?\}/g;
                let jsMatch;
                while ((jsMatch = funcRegex.exec(newJs)) !== null) {
                    const funcName = jsMatch[1];
                    const existingRegex = new RegExp(`function\\s+${funcName}\\s*\\([\\s\\S]*?\\{[\\s\\S]*?\\}`, 'g');
                    if (existingRegex.test(files.js)) {
                        files.js = files.js.replace(existingRegex, jsMatch[0]);
                        showToast(`JS ${funcName}() aktualisiert`, "green");
                        newJs = newJs.replace(jsMatch[0], "").trim();
                    }
                }
                if (newJs.length > 0) {
                    files.js += (files.js ? "\n\n" : "") + newJs;
                    showToast("JS ergänzt", "green");
                }
                undoStacks.js.push(files.js);
            }
            if (htmlChunk.length > 0) {
                const currentHtml = files.html;
                if (replaceKeyword && currentHtml.indexOf(replaceKeyword) !== -1) {
                    files.html = currentHtml.replace(replaceKeyword, htmlChunk);
                    showToast("Code ersetzt", "green");
                } else {
                    files.html += "\n" + htmlChunk;
                    showToast("HTML ergänzt", "green");
                }
                undoStacks.html.push(files.html);
            }
            localStorage.setItem('sc_project', JSON.stringify(files));
            switchTab(activeTab, true);
            document.getElementById('aiInput').value = "";
            if (wasReadOnly) toggleEditMode(); 
        }

            if (activeTab === 'html') { filename = `${loadedFileName}.html`; mimeType = "text/html"; } 
            else if (activeTab === 'css') { filename = (loadedFileName === 'index') ? "style.css" : `${loadedFileName}.css`; mimeType = "text/css"; } 
            else if (activeTab === 'js') { filename = (loadedFileName === 'index') ? "script.js" : `${loadedFileName}.js`; mimeType = "application/javascript"; }
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            a.style.display = 'none'; document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            showToast(`${filename} wurde heruntergeladen!`, "green");
        }

        function importFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            localStorage.setItem('sc_loadedFileName', baseName);
            reader.onload = (e) => {
                const content = e.target.result;
                const name = file.name.toLowerCase();
                if (name.endsWith('.html')) { files.html = content; files.css = `/* Style für ${file.name} */\n`; files.js = `// Script für ${file.name}\n`; undoStacks.css = [files.css]; undoStacks.js = [files.js]; showToast("HTML geladen", "green"); } 
                else if (name.endsWith('.css')) { files.css = content; showToast("CSS geladen", "green"); } 
                else if (name.endsWith('.js')) { files.js = content; showToast("JS geladen", "green"); }
                undoStacks[activeTab].push(files[activeTab]);
                localStorage.setItem('sc_project', JSON.stringify(files));
                switchTab(activeTab, true);
            };
            reader.readAsText(file);
            toggleSidebar();
            event.target.value = '';
        }

        switchTab(activeTab, true);

        let startY = 0;
        let startScrollTop = 0;
        lineNumbersEl.addEventListener('touchstart', (e) => {
            startY = e.touches[0].pageY;
            startScrollTop = editorEl.scrollTop;
            lineNumbersEl.style.backgroundColor = '#1e293b';
            e.preventDefault(); 
        }, { passive: false });
        lineNumbersEl.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].pageY;
            const deltaY = (startY - currentY) * 4.0; 
            editorEl.scrollTop = startScrollTop + deltaY;
            syncScroll();
            e.preventDefault();
        }, { passive: false });
        lineNumbersEl.addEventListener('touchend', () => { lineNumbersEl.style.backgroundColor = '#0d111a'; });
        
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'iframeError') {
                const correctedLine = event.data.line - 10;
                showToast(`JS-Fehler in Zeile ${correctedLine > 0 ? correctedLine : event.data.line}: ${event.data.msg}`, "red");
            }
        });

// Aktualisiert die Zahlen, wenn du Text eingibst oder löschst
editorEl.addEventListener('input', () => {
    updateLineNumbers();
});

// 1. Zentrale Scroll-Funktion
function onEditorScroll() {
    // Synchronisiere die Positionen
    if (lineNumbersEl) {
        lineNumbersEl.scrollTop = editorEl.scrollTop;
    }
    if (backdropEl) {
        backdropEl.scrollTop = editorEl.scrollTop;
        backdropEl.scrollLeft = editorEl.scrollLeft;
    }

    // Speichere die Position für den Tab-Wechsel
    scrollPositions[activeTab] = editorEl.scrollTop;
    localStorage.setItem('sc_scrollPositions', JSON.stringify(scrollPositions));
}

// 2. Sicherstellen, dass der Listener nur EINMAL gebunden ist
// Entferne manuelle addEventListener('scroll', ...) Aufrufe, 
// da das HTML Attribut onscroll="onEditorScroll()" bereits den Job macht.

editorEl.addEventListener('beforeinput', (e) => {
    if (isReadOnly) {
        e.preventDefault(); // Das ist jetzt dein "virtuelles" Readonly
    }
});


// Verhindert Textänderungen, wenn isReadOnly aktiv ist, erlaubt aber Markierung
// Verhindert Textänderungen, erlaubt aber Navigation und Auswahl
editorEl.addEventListener('keydown', (e) => {
    if (isReadOnly) {
        // Erlaube NUR Kopieren (Cmd/Ctrl + C) und Navigation
        const isCmdOrCtrl = e.ctrlKey || e.metaKey;
        const allowedShortcuts = ['c', 'a'].includes(e.key.toLowerCase());
        const isNavigation = e.key.startsWith('Arrow') || ['Home', 'End', 'PageUp', 'PageDown'].includes(e.key);

        if (!(isCmdOrCtrl && allowedShortcuts) && !isNavigation) {
            e.preventDefault();
            return false;
        }
    }
});

// --- INITIALISIERUNG BEIM START ---
// --- INITIALISIERUNG BEIM START ---
function setupInitialState() {
    isReadOnly = true; 
    const btn = document.getElementById('lockBtn');
    
    // Editor in den Markier-Modus versetzen
    editorEl.setAttribute('inputmode', 'none');
    editorEl.classList.add('selection-mode');
    
    if (btn) {
        btn.innerText = "⌨️"; 
        btn.classList.remove('glow-border', 'bg-blue-600');
        btn.classList.add('bg-gray-700', 'text-white');
    }

    // 1. Sofortiger Versuch (für die Optik)
    updateLineNumbers();

    // 2. Erzwungener Versuch nach Pufferzeit
    setTimeout(() => {
        // FORCE: Wir stellen sicher, dass der Text wirklich im Editor geladen ist
        if (files[activeTab]) {
            editorEl.value = files[activeTab];
        }
        
        updateLineNumbers(); // Jetzt generiert er die Zahlen basierend auf echtem Inhalt
        
        const lastPos = scrollPositions[activeTab] || 0;
        editorEl.scrollTop = lastPos;
        
        // Synchronisiert Backdrop und Zeilennummern sofort
        syncScroll(); 
        console.log("System bereit: " + editorEl.value.split('\n').length + " Zeilen.");
    }, 200); // 200ms ist sicherer, damit der DOM stabil ist
}

// Die Listener müssen aktiv bleiben:
editorEl.addEventListener('scroll', onEditorScroll);
editorEl.addEventListener('input', onEditorInput);

// Initialisierung starten
setupInitialState();
